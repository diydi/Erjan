<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My personal Swamppage</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
   <header>
        <h1>Welcome to Shrek Space</h1>
   </header>

   <div class="container">
        <nav class="sidebar">
            <ul>
                <li>
                    <a href="hobby.html" target="content-frame">My Hobbies</a>
                </li>
                <li>
                    <a href="to_do.html" target="content-frame">Monthly to-do lists</a>
                </li>
                <li>
                    <a href="video.html" target="content-frame">Featured Video</a>
                </li>
            </ul>
        </nav>
        <main class="content" id="main-content">
            <iframe src="welcome.html" name="content-frame" frameborder="0"></iframe>
        </main>
   </div>

   <section class="form-section">
    <h3>Contact Me</h3>
    <form id="contact-form">
        <div class="form-row">
            <input type="text" placeholder="Full Name" required />
            <input type="number" placeholder="Age" required />
        </div>
        <div class="form-row">
            <select required>
                <option value="" disabled selected>Select Gender</option>
                <option value="male">Male</option>
                <option value="female">Female</option>
            </select>
            <input type="email" placeholder="Email Address" required />
        </div>
        <textarea placeholder="Write your questions or comments here..." row="5"></textarea>
        <button type="sumbit">Sumbit Message</button>
    </form>
   </section>
   
</body>
</html>
